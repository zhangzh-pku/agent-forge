name: integration-backends

on:
  pull_request:
    paths:
      - pkg/state/**
      - pkg/queue/**
      - .github/workflows/integration-backends.yml
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - pkg/state/**
      - pkg/queue/**
      - .github/workflows/integration-backends.yml
      - go.mod
      - go.sum

permissions:
  contents: read

jobs:
  localstack-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      localstack:
        image: localstack/localstack:3.2
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,sqs
          AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 40); do
            if curl -fsS "http://localhost:4566/_localstack/health" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become ready in time" >&2
          exit 1

      - name: Run Dynamo integration test
        env:
          AGENTFORGE_INTEGRATION_AWS_ENDPOINT: http://localhost:4566
        run: go test -v ./pkg/state -run TestDynamoStoreIntegration -count=1

      - name: Run SQS integration test
        env:
          AGENTFORGE_INTEGRATION_AWS_ENDPOINT: http://localhost:4566
        run: go test -v ./pkg/queue -run TestSQSQueueIntegration -count=1
