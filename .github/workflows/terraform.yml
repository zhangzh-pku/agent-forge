name: terraform

on:
  pull_request:
    paths:
      - deploy/terraform/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - main
    paths:
      - deploy/terraform/**
      - .github/workflows/terraform.yml

permissions:
  contents: read

jobs:
  terraform-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Lambda zip artifacts
        run: make build-lambda-zip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Terraform fmt (check)
        run: terraform -chdir=deploy/terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=deploy/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=deploy/terraform validate

      - name: TFLint
        run: |
          tflint --init
          tflint --chdir=deploy/terraform

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: deploy/terraform
